<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modifică Ingredient</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <div class="card shadow">
        <div class="card-body p-4">
          <h1 class="text-center mb-4">Modifică ingredient</h1>

          <form th:action="@{/ingrediente/{id}(id=${ingredient.idIngredient})}" 
                th:object="${ingredient}" 
                method="post">

            <div class="mb-3">
                <label class="form-label">ID Ingredient</label>
                <input type="text" class="form-control" th:value="*{idIngredient}" disabled />
            </div>

            <div class="mb-3">
              <label class="form-label">Nume ingredient</label>
              <input type="text" class="form-control" th:field="*{numeIngredient}" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Alergen</label>
              <input type="text" class="form-control" th:field="*{alergen}" />
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Salvează modificările</button>
            </div>

            <div class="d-flex justify-content-between mt-3">
              <a class="btn btn-outline-secondary" th:href="@{/ingrediente}">Renunță</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaugă Rețetă</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9 col-sm-11">

      <div class="card shadow">
        <div class="card-body p-4">
          <h1 class="text-center mb-4">Adaugă rețetă</h1>

          <form th:action="@{/retete}" th:object="${reteta}" method="post">

            <div class="mb-3">
              <label class="form-label">Nume rețetă</label>
              <input type="text"
                     class="form-control"
                     placeholder="Introdu numele rețetei"
                     th:field="*{numeReteta}"
                     required />
            </div>

            <div class="mb-3">
              <label class="form-label">Descriere</label>
              <textarea class="form-control"
                        rows="3"
                        placeholder="Descriere scurtă (opțional)"
                        th:field="*{descriere}"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Timp preparare (minute)</label>
                <input type="number"
                       class="form-control"
                       min="0"
                       placeholder="Ex: 25"
                       th:field="*{timpPreparareMin}" />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Porții</label>
                <input type="number"
                       class="form-control"
                       min="0"
                       placeholder="Ex: 2"
                       th:field="*{portii}" />
              </div>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                Salvează
              </button>
            </div>

            <div class="d-flex justify-content-between mt-3">
              <a class="btn btn-outline-secondary" th:href="@{/retete}">
                Înapoi la listă
              </a>
              <a class="btn btn-outline-dark" th:href="@{/}">
                Meniu principal
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>

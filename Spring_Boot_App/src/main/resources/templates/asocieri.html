<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compoziție Rețete</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-4">
  <div class="row mb-3">
    <div class="col"><h1 class="text-center">Compoziție Rețete</h1></div>
  </div>

  <div class="row mb-3">
    <div class="col d-flex justify-content-center gap-2 flex-wrap">
      <a class="btn btn-primary" th:href="@{/asocieri/new}">Adaugă o nouă compoziție</a>
      <a class="btn btn-outline-dark" th:href="@{/}">Meniu principal</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th style="width: 50px;">ID Compoziție</th>
          <th style="min-width: 150px;">Rețetă</th>
          <th style="min-width: 150px;">Ingredient</th>
          <th style="width: 100px;">Cantitate</th>
          <th style="width: 100px;">Unitate măsură</th>
          <th style="width: 180px;">Acțiuni</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="asociere : ${asocieri}">
          <td th:text="${asociere.idRetetaIngredient}"></td>
          
          <td th:text="${asociere.reteta != null} ? ${asociere.reteta.numeReteta} : 'N/A'"></td>
          
          <td th:text="${asociere.ingredient != null} ? ${asociere.ingredient.numeIngredient} : 'N/A'"></td>

          <td th:text="${asociere.cantitate}"></td>
          <td th:text="${asociere.unitate}"></td>

          <td class="text-center">
            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <a class="btn btn-outline-primary btn-sm"
                 th:href="@{/asocieri/edit/{id}(id=${asociere.idRetetaIngredient})}">
                Modifică
              </a>
              <a class="btn btn-outline-danger btn-sm"
                 th:href="@{/asocieri/delete/{id}(id=${asociere.idRetetaIngredient})}"
                 onclick="return confirm('Sigur vrei să ștergi această compoziție?');">
                Șterge
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

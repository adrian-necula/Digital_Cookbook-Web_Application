<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modifică Rețetă</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9 col-sm-11">
      <div class="card shadow">
        <div class="card-body p-4">
          <h1 class="text-center mb-4">Modifică rețetă</h1>

          <form th:action="@{/retete/{id}(id=${reteta.idReteta})}" th:object="${reteta}" method="post">

            <div class="mb-3">
                <label class="form-label">ID Rețetă</label>
                <input type="text" class="form-control" th:value="*{idReteta}" disabled />
            </div>

            <div class="mb-3">
              <label class="form-label">Nume rețetă</label>
              <input type="text" class="form-control" th:field="*{numeReteta}" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Descriere</label>
              <textarea class="form-control" rows="3" th:field="*{descriere}"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Timp preparare (minute)</label>
                <input type="number" class="form-control" min="0" th:field="*{timpPreparareMin}" />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Porții</label>
                <input type="number" class="form-control" min="0" th:field="*{portii}" />
              </div>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Salvează modificările</button>
            </div>

            <div class="d-flex justify-content-between mt-3">
              <a class="btn btn-outline-secondary" th:href="@{/retete}">Renunță</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

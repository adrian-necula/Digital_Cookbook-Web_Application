<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingrediente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-4">
  <div class="row mb-3">
    <div class="col"><h1 class="text-center">Ingrediente</h1></div>
  </div>

  <div class="row mb-3">
    <div class="col d-flex justify-content-center gap-2 flex-wrap">
      <a class="btn btn-primary" th:href="@{/ingrediente/new}">Adaugă un nou ingredient</a>
      <a class="btn btn-outline-dark" th:href="@{/}">Meniu principal</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th style="width: 160px;">ID Ingredient</th>
          <th>Nume Ingredient</th>
          <th style="width: 260px;">Alergen</th>
          <th style="width: 220px;">Acțiuni</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="ingredient : ${ingrediente}">
          <td th:text="${ingredient.idIngredient}"></td>
          <td th:text="${ingredient.numeIngredient}"></td>
          <td th:text="${ingredient.alergen}"></td>
          <td class="text-center">
            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <a class="btn btn-outline-primary btn-sm"
                 th:href="@{/ingrediente/edit/{id}(id=${ingredient.idIngredient})}">
                Modifică
              </a>

              <a class="btn btn-outline-danger btn-sm"
                 th:href="@{/ingrediente/delete/{id}(id=${ingredient.idIngredient})}"
                 onclick="return confirm('Sigur vrei să ștergi acest ingredient?');">
                Șterge
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

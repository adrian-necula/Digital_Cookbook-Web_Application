<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte de bucate</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
        
  <link rel="stylesheet" th:href="@{/style.css}" />

  <style>
    body {
      justify-content: center; 
      padding-top: 0 !important;
      padding-bottom: 10vh; 
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    
    <div class="col-lg-6 col-md-9 col-sm-10">
      
      <div class="glass p-4 text-center text-white">
        
        <h1 class="display-5 fw-bold mb-3">Carte de bucate</h1>
        
        <p class="lead mb-4">
          Bine ai venit în aplicația de gestiune culinară.
        </p>

        <div class="d-grid gap-3 col-10 mx-auto">
          <a class="btn btn-outline-light btn-lg hero-btn" th:href="@{/retete}">
            Rețete
          </a>
          <a class="btn btn-outline-light btn-lg hero-btn" th:href="@{/ingrediente}">
            Ingrediente
          </a>
          <a class="btn btn-outline-light btn-lg hero-btn" th:href="@{/asocieri}">
            Compoziție Rețete
          </a>
        </div>

        <hr class="my-5 border-light" />

        <div class="d-flex justify-content-between flex-wrap gap-2 opacity-75 small">
          <span class="fw-bold">Necula Adrian-Nicușor</span>
          <span>București 2025–2026</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

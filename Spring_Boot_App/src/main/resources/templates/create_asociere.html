<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaugă Compoziție</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow">
        <div class="card-body p-4">
          <h1 class="text-center mb-4">Adaugă compoziție</h1>

          <form th:action="@{/asocieri}" th:object="${asociere}" method="post">

            <div class="mb-3">
              <label class="form-label">Alege Rețeta</label>
              <select class="form-select" th:field="*{reteta}" required>
                <option value="" disabled selected>Selectează o rețetă</option>
                <option th:each="r : ${toateretetele}" 
                        th:value="${r.idReteta}" 
                        th:text="${r.numeReteta}"></option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Alege Ingredient</label>
              <select class="form-select" th:field="*{ingredient}" required>
                 <option value="" disabled selected>Selectează un ingredient</option>
                 <option th:each="ing : ${toateingredientele}" 
                         th:value="${ing.idIngredient}" 
                         th:text="${ing.numeIngredient}"></option>
              </select>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Cantitate</label>
                <input type="number" step="0.01" class="form-control" th:field="*{cantitate}" placeholder="ex: 200" required />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Unitate</label>
                <input type="text" class="form-control" th:field="*{unitate}" placeholder="ex: grame, buc" required />
              </div>
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Salvează</button>
            </div>

            <div class="d-flex justify-content-between mt-3">
              <a class="btn btn-outline-secondary" th:href="@{/asocieri}">Înapoi</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
